name: Build & Release (tagged)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required addon files exist
        run: |
          set -e
          test -f "ShortyFalls.toc" || (echo "ERROR: ShortyFalls.toc not found" && exit 1)
          test -f "ShortyFalls.lua" || (echo "ERROR: ShortyFalls.lua not found" && exit 1)

          if [ -d "media" ]; then
            echo "Found media/"
          else
            echo "ERROR: media/ folder not found" && exit 1
          fi

      - name: Set TOC version from tag
        run: |
          set -e
          VER="${GITHUB_REF_NAME#v}"
          echo "VER=${VER}" >> $GITHUB_ENV

          TOC="ShortyFalls.toc"
          if grep -qE '^## Version:' "$TOC"; then
            sed -i "s/^## Version:.*/## Version: ${VER}/" "$TOC"
          else
            echo "## Version: ${VER}" >> "$TOC"
          fi

          echo "TOC version now:"
          grep -E '^## Version:' "$TOC" || true

      - name: Stage addon payload
        run: |
          set -e
          rm -rf _stage
          mkdir -p _stage/ShortyFalls

          cp ShortyFalls.toc _stage/ShortyFalls/
          cp ShortyFalls.lua _stage/ShortyFalls/
          cp -a media _stage/ShortyFalls/media

          find _stage -name ".DS_Store" -delete || true
          find _stage -name "Thumbs.db" -delete || true

          echo "Staged contents:"
          ls -lah _stage/ShortyFalls

      - name: Create zip
        run: |
          set -e
          ZIP_NAME="ShortyFalls-${VER}.zip"
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

          rm -f "${ZIP_NAME}"
          (cd _stage && zip -r "../${ZIP_NAME}" ShortyFalls)

          echo "Zip listing:"
          unzip -l "${ZIP_NAME}" | head -n 120

      - name: Create GitHub Release and upload zip
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true
          body: |
            Guild release build.
            Not intended for general public use. No external support.